name: Package Repositories

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version without leading v
        required: false
        default: 0.1.7-alpha
      package_release:
        description: Package release number
        required: false
        default: "1"
  push:
    tags:
      - "v*"
  release:
    types: [published, prereleased]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c libarchive-tools pacman-package-manager zstd

      - name: Build package matrix
        env:
          RAW_VERSION: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
          PACKAGE_RELEASE: ${{ inputs.package_release || '1' }}
        run: |
          set -eu
          version="${RAW_VERSION#v}"
          PKG_VERSION="$version" PKG_RELEASE="$PACKAGE_RELEASE" PKG_GOARCH=amd64 make package
          PKG_VERSION="$version" PKG_RELEASE="$PACKAGE_RELEASE" PKG_GOARCH=arm64 make package
          PKG_VERSION="$version" PKG_RELEASE="$PACKAGE_RELEASE" PKG_FREEBSD_GOARCH=amd64 make package-freebsd-tgz
          PKG_VERSION="$version" PKG_RELEASE="$PACKAGE_RELEASE" PKG_FREEBSD_GOARCH=arm64 make package-freebsd-tgz

      - uses: actions/upload-artifact@v7
        with:
          name: package-artifacts
          path: dist/packages/
          retention-days: 7

  build-freebsd-pkg-repos:
    runs-on: [self-hosted, Linux, X64, freebsd-pkg-builder]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Build native FreeBSD pkg repositories
        env:
          RAW_VERSION: ${{ inputs.version || github.event.release.tag_name || github.ref_name }}
          PACKAGE_RELEASE: ${{ inputs.package_release || '1' }}
          FREEBSD_PKG_REMOTE: unifi-stubd-freebsd-builder
        run: |
          set -eu
          version="${RAW_VERSION#v}"
          PKG_VERSION="$version" PKG_RELEASE="$PACKAGE_RELEASE" make package-freebsd-pkg-repos
          tar -C dist/freebsd-pkg-repos -czf dist/freebsd-pkg-repos.tar.gz repo

      - uses: actions/upload-artifact@v7
        with:
          name: freebsd-pkg-repos
          path: dist/freebsd-pkg-repos.tar.gz
          retention-days: 7

  build-and-deploy:
    needs:
      - build-packages
      - build-freebsd-pkg-repos
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev createrepo-c libarchive-tools pacman-package-manager zstd

      - uses: actions/download-artifact@v7
        with:
          name: package-artifacts
          path: dist/packages

      - uses: actions/download-artifact@v7
        with:
          name: freebsd-pkg-repos
          path: dist/freebsd-pkg-repos-archive

      - name: Extract native FreeBSD pkg repositories
        run: |
          mkdir -p dist/freebsd-pkg-repos
          tar -xzf dist/freebsd-pkg-repos-archive/freebsd-pkg-repos.tar.gz -C dist/freebsd-pkg-repos

      - name: Build static package repositories
        env:
          FREEBSD_PKG_REPO_DIR: dist/freebsd-pkg-repos/repo
        run: scripts/build-package-repos.sh

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/package-site

      - id: deployment
        uses: actions/deploy-pages@v5
