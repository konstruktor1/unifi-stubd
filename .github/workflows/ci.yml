name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go from latest stable release
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: Set up Go from module version
        if: github.ref != 'refs/heads/main'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make check
      - run: make vulncheck
      - run: mkdir -p dist
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: dist/sbom.spdx.json
          retention-days: 7
      - run: make build-freebsd

  package:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - run: make package
      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: dist/packages/
          retention-days: 7
