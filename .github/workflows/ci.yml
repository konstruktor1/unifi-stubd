name: CI

on:
  workflow_dispatch:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go from latest stable release
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: Set up Go from module version
        if: github.ref != 'refs/heads/main'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make check
      - run: make vulncheck
      - run: mkdir -p dist
      - uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: dist/sbom.spdx.json
          retention-days: 7
      - run: make build-freebsd

  package:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: Resolve package version
        id: package-version
        run: |
          set -eu
          version="$(git describe --tags --abbrev=0 --match 'v[0-9]*' | sed 's/^v//')"
          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: PKG_VERSION='${{ steps.package-version.outputs.version }}' make package
      - name: Install deb package smoke test
        run: |
          set -eu
          deb="$(find dist/packages -maxdepth 1 -name 'unifi-stubd_*_amd64.deb' -print -quit)"
          test -n "$deb"
          sudo dpkg -i "$deb"
          test -x /usr/local/bin/unifi-stubd
          test "$(unifi-stubd -version)" = '${{ steps.package-version.outputs.version }}'
          sudo unifi-stubd -validate -config /etc/unifi-stubd/config.yaml
          dpkg -L unifi-stubd | grep -qx /lib/systemd/system/unifi-stubd.service
      - uses: actions/upload-artifact@v7
        with:
          name: packages
          path: dist/packages/
          retention-days: 7
