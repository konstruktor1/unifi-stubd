name: CI

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: go.sum

      - name: Run checks
        run: make check

  package:
    name: Package ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
          cache: true
          cache-dependency-path: go.sum

      - name: Build packages
        run: make package
        env:
          PKG_GOARCH: ${{ matrix.goarch }}

      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: unifi-stubd-linux-${{ matrix.goarch }}-packages
          path: dist/packages/*
          if-no-files-found: error
