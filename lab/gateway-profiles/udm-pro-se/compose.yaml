# UDM Pro SE firmware simulation compose file with shim build helper.

name: udm-pro-se-fw-simulation

services:
  shim-builder:
    image: debian:bullseye
    platform: linux/arm64
    profiles:
      - build-shim
    volumes:
      - ${SIM_DIR:-/tmp/unifi-fw-sim-udm-pro-se}:/mock
    command:
      - sh
      - -lc
      - |
        apt-get update
        apt-get install -y --no-install-recommends gcc libc6-dev
        gcc -shared -fPIC -Wall -Wextra -O2 \
          -I /mock/ldpreload \
          -o /mock/libubnthal_redirect.so \
          /mock/ldpreload/*.c \
          -ldl

  firmware:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${UDM_PRO_SE_BASE_IMAGE:-udm-pro-se-fw:5.0.16}
    image: udm-pro-se-fw-sim:5.0.16
    platform: linux/arm64
    command: ["/usr/local/bin/udm-pro-se-sim-start"]
    network_mode: none
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges
    environment:
      UNIFI_FW_SIM_MODEL: UDMPROSE
      UNIFI_FW_SIM_MAC: 02:15:6d:00:ea:2c
      UNIFI_FW_SIM_ALLOW_PARTIAL: "1"
      UNIFI_FW_SIM_TRACE: ${UNIFI_FW_SIM_TRACE:-0}
      UNIFI_FW_SIM_UDAPI_WAIT_SECONDS: ${UNIFI_FW_SIM_UDAPI_WAIT_SECONDS:-180}
      UNIFI_FW_SIM_KERNEL_DIR: /opt/unifi-fw-sim/kernel
      UBNTHAL_REDIRECT_DEBUG: ${UBNTHAL_REDIRECT_DEBUG:-0}
      UBNTHAL_REDIRECT_TRACE_ALL: ${UBNTHAL_REDIRECT_TRACE_ALL:-0}
    volumes:
      - ${SIM_DIR:-/tmp/unifi-fw-sim-udm-pro-se}:/mock
      - ${UDM_PRO_SE_KERNEL_DEPLOY_DIR:-../udm-pro-se-vm/artifacts/deploy/kernel}:/opt/unifi-fw-sim/kernel:ro
    tmpfs:
      - /tmp:exec,nosuid,nodev
      - /run:exec,nosuid,nodev
      - /var/run:exec,nosuid,nodev
      - /var/log:nosuid,nodev
      - /data:exec,nosuid,nodev
