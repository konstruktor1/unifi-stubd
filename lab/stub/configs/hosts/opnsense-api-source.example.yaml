# Read-only OPNsense API source for the unifi-stubd-opnsense generator.
#
# This file is not consumed by the unifi-stubd daemon. The companion command
# reads it together with an existing unifi-stubd config and prints a generated,
# reviewable unifi-stubd YAML document.
base_url: https://127.0.0.1
api_key_file: /usr/local/etc/unifi-stubd/opnsense-api-key
api_secret_file: /usr/local/etc/unifi-stubd/opnsense-api-secret
api_key_env: ""
api_secret_env: ""
ca_file: ""
insecure_skip_verify: false
timeout_ms: 2000
uplink_port: 3
gateway_status: true
interfaces:
  - port: 3
    interface: ixl0
    name: WAN SFP+
    role: wan
    network_group: WAN
    network_name: opnsense_wan
    vlan: 3
  - port: 4
    interface: vtnet0
    name: LAN SFP+ to server-lan1
    role: lan
    network_group: LAN
    network_name: opnsense_lan
    vlan: 1
wan_health:
  source: static
  interval_seconds: 10
  timeout_ms: 1000
  targets: []
