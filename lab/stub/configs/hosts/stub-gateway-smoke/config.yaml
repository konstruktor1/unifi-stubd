# Temporary Docker integration host for the gateway-shaped uxg-lite payload.
operation_mode: port-map
controller_url: http://unifi:8080/inform
profile: uxg-lite
mac: 02:15:6d:00:08:23
ip: 172.31.242.27
hostname: stub-gateway-smoke
uplink_speed: profile
interval_seconds: 2
no_discovery: true

port_mappings:
  - port: 1
    interface: pmeth1
  - port: 2
    interface: pmeth2

ssh_host_key_path: /var/lib/unifi-stubd/ssh_host_rsa_key
state_path: /var/lib/unifi-stubd/adoption.env
status_path: /var/lib/unifi-stubd/status.json
