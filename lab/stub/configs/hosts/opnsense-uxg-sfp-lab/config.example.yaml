# Sanitized example based on an OPNsense/FreeBSD host represented as a UXG Pro.
# WAN is the first SFP+ cage and LAN is the second SFP+ cage to server-lan1.
operation_mode: stub
controller_url: http://192.0.2.10:8080/inform
profile: uxgpro
ports: 4
version: 5.0.16.30689
mac: 02:00:5e:00:53:ca
ip: 192.0.2.29
hostname: opnsense-uxg-sfp-lab
link_speed: 0
uplink_speed: profile
# UXG-Pro profile mapping:
#   port 1 -> eth0, profile role wan,  1G RJ45
#   port 2 -> eth1, profile role lan,  1G RJ45
#   port 3 -> eth2, profile role wan2, 10G SFP+
#   port 4 -> eth3, profile role lan2, 10G SFP+
# This lab makes physical port 3 the effective WAN. The controller-facing
# ifname remains eth2; the FreeBSD interface ixl0 is emitted as
# source_interface only.
uplink_port: 3
interval_seconds: 10
no_discovery: false

uplink_neighbor:
  mac: 02:00:5e:00:53:01
  ip: 198.51.100.1
  vlan: 0
  type: gateway

port_neighbors:
  - port: 4
    mac: 02:00:5e:00:53:c9
    hostname: server-lan1
    ip: 192.0.2.190
    type: usw
    static: true

port_overrides:
  - port: 1
    name: Port 1
    role: unassigned
    network_group: Unassigned
    up: false
    speed: 0
    media: GE
  - port: 2
    name: Port 2
    role: unassigned
    network_group: Unassigned
    up: false
    speed: 0
    media: GE
  - port: 3
    name: WAN SFP+
    # Effective gateway function for this physical profile port.
    role: wan
    network_group: WAN
    # Assignment metadata mirrors lab/controller display state. The stub does
    # not create, edit, or apply VLANs or UniFi network objects.
    portconf_id: portconf-opnsense-wan
    networkconf_id: network-opnsense-wan
    native_networkconf_id: network-opnsense-wan
    network_name: opnsense_wan
    vlan: 3
    # Local OPNsense/FreeBSD source for MAC/IP/link/speed facts. This value
    # must never become a controller ifname.
    interface: ixl0
    mac: 02:00:5e:00:53:ca
    ip: 198.51.100.9
    netmask: 255.255.255.0
    wan_uptime_percent: 100
    wan_latency_ms: 7
    wan_connected: true
    speed: 10000
    media: SFP+
  - port: 4
    name: LAN SFP+ to server-lan1
    role: lan
    network_group: LAN
    portconf_id: portconf-opnsense-lan
    networkconf_id: network-opnsense-lan
    native_networkconf_id: network-opnsense-lan
    network_name: opnsense_lan
    vlan: 1
    interface: vtnet0
    mac: 02:00:5e:00:53:04
    ip: 192.0.2.1
    netmask: 255.255.255.0
    speed: 10000
    media: SFP+

wan_health:
  # static uses the wan_* hints above. Use ping only when this host should run a
  # local read-only probe and report the result as gateway telemetry.
  source: static
  interval_seconds: 10
  timeout_ms: 1000
  targets: []

observe_interface: ""
observe_bridge: ""
lldp_source: off
traffic_source: off
traffic_rates_enabled: true
discovery_targets:
  - 192.0.2.10:10001
  - 192.0.2.11:10001
ssh_listen: 192.0.2.29:2222
ssh_user: ubnt
ssh_password: ubnt
ssh_host_key_path: /var/lib/unifi-stubd/opnsense-ssh-host-key
state_path: /var/lib/unifi-stubd/opnsense-adoption.env
status_path: /var/lib/unifi-stubd/opnsense-status.json
