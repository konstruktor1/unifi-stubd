# Local unifi-stubd stub lab with controller and inform MITM services.

name: unifi-stubd-stub-lab

x-stub-common: &stub-common
  init: true
  depends_on:
    inform-mitm:
      condition: service_started
  extra_hosts:
    - "unifi:${UNIFI_STUB_LAB_MITM_IP:-172.31.242.12}"
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  unifi:
    image: ${UNIFI_NETWORK_IMAGE:-lscr.io/linuxserver/unifi-network-application:10.3.58-ls129}
    container_name: ${UNIFI_CONTAINER:-stub-lab-unifi-network}
    depends_on:
      unifi-db:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Zurich}
      MONGO_USER: ${UNIFI_MONGO_USER:-unifi}
      MONGO_PASS: ${UNIFI_MONGO_PASS:-unifi-lab-pass}
      MONGO_HOST: unifi-db
      MONGO_PORT: 27017
      MONGO_DBNAME: ${UNIFI_MONGO_DBNAME:-unifi}
      MONGO_AUTHSOURCE: admin
      MEM_LIMIT: ${UNIFI_MEM_LIMIT:-1024}
      MEM_STARTUP: ${UNIFI_MEM_STARTUP:-1024}
    networks:
      lab:
        aliases:
          - unifi-controller
        ipv4_address: ${UNIFI_STUB_LAB_CONTROLLER_IP:-172.31.242.10}
      ui: {}
    ports:
      - "127.0.0.1:${UNIFI_HTTPS_PORT:-8443}:8443"
    volumes:
      - unifi_config:/config
    restart: unless-stopped

  unifi-db:
    image: ${UNIFI_MONGO_IMAGE:-mongo:7.0}
    container_name: ${UNIFI_MONGO_CONTAINER:-stub-lab-unifi-db}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${UNIFI_MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${UNIFI_MONGO_ROOT_PASSWORD:-unifi-root-lab-pass}
      MONGO_USER: ${UNIFI_MONGO_USER:-unifi}
      MONGO_PASS: ${UNIFI_MONGO_PASS:-unifi-lab-pass}
      MONGO_DBNAME: ${UNIFI_MONGO_DBNAME:-unifi}
      MONGO_AUTHSOURCE: admin
    networks:
      lab:
        ipv4_address: ${UNIFI_STUB_LAB_MONGO_IP:-172.31.242.11}
    volumes:
      - mongo_data:/data/db
      - type: bind
        source: ../mongo-init-unifi.sh
        target: /docker-entrypoint-initdb.d/init-mongo.sh
        read_only: true
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  inform-mitm:
    image: ${MITMPROXY_IMAGE:-mitmproxy/mitmproxy:latest}
    container_name: ${MITMPROXY_CONTAINER:-stub-lab-inform-mitm}
    depends_on:
      unifi:
        condition: service_started
    networks:
      lab:
        aliases:
          - unifi-inform-mitm
        ipv4_address: ${UNIFI_STUB_LAB_MITM_IP:-172.31.242.12}
    volumes:
      - type: bind
        source: ../mitm-inform-dump.py
        target: /scripts/mitm-inform-dump.py
        read_only: true
      - type: bind
        source: ./captures
        target: /captures
    command:
      - mitmdump
      - --mode
      - reverse:http://unifi-controller:8080@8080
      - --listen-host
      - 0.0.0.0
      - --set
      - keep_host_header=true
      - --set
      - flow_detail=2
      - -s
      - /scripts/mitm-inform-dump.py
      - -w
      - /captures/inform.flows
    restart: unless-stopped

  stub:
    <<: *stub-common
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VERSION: ${UNIFI_STUBD_VERSION:-lab}
    image: ${UNIFI_STUB_IMAGE:-unifi-stubd:lab}
    container_name: ${UNIFI_STUB_CONTAINER:-stub}
    hostname: stub
    networks:
      lab:
        ipv4_address: ${UNIFI_STUB_IP:-172.31.242.24}
    volumes:
      - stub_state:/var/lib/unifi-stubd
      - type: bind
        source: ./configs
        target: /usr/local/share/unifi-stubd-lab/configs
        read_only: true
    command:
      - -config
      - ${UNIFI_STUB_CONFIG:-/usr/local/share/unifi-stubd-lab/configs/hosts/stub/config.yaml}
      - -profile
      - ${UNIFI_STUB_PROFILE:-us8}
      - -mac
      - ${UNIFI_STUB_MAC:-02:15:6d:00:08:01}
      - -ip
      - ${UNIFI_STUB_IP:-172.31.242.24}
      - -hostname
      - ${UNIFI_STUB_HOSTNAME:-stub}

networks:
  lab:
    driver: bridge
    ipam:
      config:
        - subnet: ${UNIFI_STUB_LAB_SUBNET:-172.31.242.0/24}
  ui:
    driver: bridge

volumes:
  mongo_data:
  unifi_config:
  stub_state:
