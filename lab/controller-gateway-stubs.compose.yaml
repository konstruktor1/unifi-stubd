name: unifi-stubd-gateway-lab

x-stub-common: &stub-common
  init: true
  depends_on:
    inform-mitm:
      condition: service_started
  extra_hosts:
    - "unifi:${UNIFI_STUB_LAB_MITM_IP:-172.31.242.12}"
  cap_drop:
    - ALL
  cap_add:
    - NET_BIND_SERVICE
  security_opt:
    - no-new-privileges:true
  restart: unless-stopped

services:
  unifi:
    image: ${UNIFI_NETWORK_IMAGE:-lscr.io/linuxserver/unifi-network-application:latest}
    container_name: ${UNIFI_CONTAINER:-stub-lab-unifi-network}
    depends_on:
      unifi-db:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Zurich}
      MONGO_USER: ${UNIFI_MONGO_USER:-unifi}
      MONGO_PASS: ${UNIFI_MONGO_PASS:-unifi-lab-pass}
      MONGO_HOST: unifi-db
      MONGO_PORT: 27017
      MONGO_DBNAME: ${UNIFI_MONGO_DBNAME:-unifi}
      MONGO_AUTHSOURCE: admin
      MEM_LIMIT: ${UNIFI_MEM_LIMIT:-1024}
      MEM_STARTUP: ${UNIFI_MEM_STARTUP:-1024}
    networks:
      lab:
        aliases:
          - unifi-controller
        ipv4_address: ${UNIFI_STUB_LAB_CONTROLLER_IP:-172.31.242.10}
      ui: {}
    ports:
      - "127.0.0.1:${UNIFI_HTTPS_PORT:-8443}:8443"
    volumes:
      - unifi_config:/config
    restart: unless-stopped

  unifi-db:
    image: ${UNIFI_MONGO_IMAGE:-mongo:7.0}
    container_name: ${UNIFI_MONGO_CONTAINER:-stub-lab-unifi-db}
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${UNIFI_MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${UNIFI_MONGO_ROOT_PASSWORD:-unifi-root-lab-pass}
      MONGO_USER: ${UNIFI_MONGO_USER:-unifi}
      MONGO_PASS: ${UNIFI_MONGO_PASS:-unifi-lab-pass}
      MONGO_DBNAME: ${UNIFI_MONGO_DBNAME:-unifi}
      MONGO_AUTHSOURCE: admin
    networks:
      lab:
        ipv4_address: ${UNIFI_STUB_LAB_MONGO_IP:-172.31.242.11}
    volumes:
      - mongo_data:/data/db
      - type: bind
        source: ./mongo-init-unifi.sh
        target: /docker-entrypoint-initdb.d/init-mongo.sh
        read_only: true
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    restart: unless-stopped

  inform-mitm:
    image: ${MITMPROXY_IMAGE:-mitmproxy/mitmproxy:latest}
    container_name: ${MITMPROXY_CONTAINER:-stub-lab-inform-mitm}
    depends_on:
      unifi:
        condition: service_started
    networks:
      lab:
        aliases:
          - unifi-inform-mitm
        ipv4_address: ${UNIFI_STUB_LAB_MITM_IP:-172.31.242.12}
    volumes:
      - type: bind
        source: ./mitm-inform-dump.py
        target: /scripts/mitm-inform-dump.py
        read_only: true
      - type: bind
        source: ./captures
        target: /captures
    command:
      - mitmdump
      - --mode
      - reverse:http://unifi-controller:8080@8080
      - --listen-host
      - 0.0.0.0
      - --set
      - keep_host_header=true
      - --set
      - flow_detail=2
      - -s
      - /scripts/mitm-inform-dump.py
      - -w
      - /captures/inform.flows
    restart: unless-stopped

  stub-ugw3:
    <<: *stub-common
    build:
      context: ..
      dockerfile: lab/gateway-profiles/ugw3/Dockerfile
      args:
        VERSION: ${UNIFI_STUBD_VERSION:-lab}
    image: ${UNIFI_STUB_UGW3_IMAGE:-unifi-stubd-ugw3:lab}
    profiles:
      - ugw3
      - gateways
    container_name: ${UNIFI_STUB_UGW3_CONTAINER:-stub-lab-ugw3}
    hostname: stub-ugw3
    networks:
      lab:
        ipv4_address: ${UNIFI_STUB_UGW3_IP:-172.31.242.20}
    volumes:
      - stub_ugw3_state:/var/lib/unifi-stubd
    command:
      - -mac
      - ${UNIFI_STUB_UGW3_MAC:-02:15:6d:00:03:01}
      - -ip
      - ${UNIFI_STUB_UGW3_IP:-172.31.242.20}
      - -hostname
      - stub-ugw3
      - -controller
      - http://unifi:8080/inform
      - -no-discovery
      - -ssh-listen
      - 0.0.0.0:22
      - -ssh-host-key
      - /var/lib/unifi-stubd/ssh_host_rsa_key
      - -ssh-state
      - /var/lib/unifi-stubd/adoption.env
      - -status-path
      - /var/lib/unifi-stubd/status.json

  stub-uxg-lite:
    <<: *stub-common
    build:
      context: ..
      dockerfile: lab/gateway-profiles/uxg-lite/Dockerfile
      args:
        VERSION: ${UNIFI_STUBD_VERSION:-lab}
    image: ${UNIFI_STUB_UXG_LITE_IMAGE:-unifi-stubd-uxg-lite:lab}
    profiles:
      - uxg-lite
      - gateways
    container_name: ${UNIFI_STUB_UXG_LITE_CONTAINER:-stub-lab-uxg-lite}
    hostname: stub-uxg-lite
    networks:
      lab:
        ipv4_address: ${UNIFI_STUB_UXG_LITE_IP:-172.31.242.21}
    volumes:
      - stub_uxg_lite_state:/var/lib/unifi-stubd
    command:
      - -mac
      - ${UNIFI_STUB_UXG_LITE_MAC:-02:15:6d:00:10:01}
      - -ip
      - ${UNIFI_STUB_UXG_LITE_IP:-172.31.242.21}
      - -hostname
      - stub-uxg-lite
      - -controller
      - http://unifi:8080/inform
      - -no-discovery
      - -ssh-listen
      - 0.0.0.0:22
      - -ssh-host-key
      - /var/lib/unifi-stubd/ssh_host_rsa_key
      - -ssh-state
      - /var/lib/unifi-stubd/adoption.env
      - -status-path
      - /var/lib/unifi-stubd/status.json

  stub-uxgpro:
    <<: *stub-common
    build:
      context: ..
      dockerfile: lab/gateway-profiles/uxgpro/Dockerfile
      args:
        VERSION: ${UNIFI_STUBD_VERSION:-lab}
    image: ${UNIFI_STUB_UXGPRO_IMAGE:-unifi-stubd-uxgpro:lab}
    profiles:
      - uxgpro
      - gateways
    container_name: ${UNIFI_STUB_UXGPRO_CONTAINER:-stub-lab-uxgpro}
    hostname: stub-uxgpro
    networks:
      lab:
        ipv4_address: ${UNIFI_STUB_UXGPRO_IP:-172.31.242.22}
    volumes:
      - stub_uxgpro_state:/var/lib/unifi-stubd
    command:
      - -mac
      - ${UNIFI_STUB_UXGPRO_MAC:-02:15:6d:00:20:01}
      - -ip
      - ${UNIFI_STUB_UXGPRO_IP:-172.31.242.22}
      - -hostname
      - stub-uxgpro
      - -controller
      - http://unifi:8080/inform
      - -no-discovery
      - -ssh-listen
      - 0.0.0.0:22
      - -ssh-host-key
      - /var/lib/unifi-stubd/ssh_host_rsa_key
      - -ssh-state
      - /var/lib/unifi-stubd/adoption.env
      - -status-path
      - /var/lib/unifi-stubd/status.json

  stub-ucg-fiber:
    <<: *stub-common
    build:
      context: ..
      dockerfile: lab/gateway-profiles/ucg-fiber/Dockerfile
      args:
        VERSION: ${UNIFI_STUBD_VERSION:-lab}
    image: ${UNIFI_STUB_UCG_FIBER_IMAGE:-unifi-stubd-ucg-fiber:lab}
    profiles:
      - ucg-fiber
      - gateways
    container_name: ${UNIFI_STUB_UCG_FIBER_CONTAINER:-stub-lab-ucg-fiber}
    hostname: stub-ucg-fiber
    networks:
      lab:
        ipv4_address: ${UNIFI_STUB_UCG_FIBER_IP:-172.31.242.23}
    volumes:
      - stub_ucg_fiber_state:/var/lib/unifi-stubd
    command:
      - -mac
      - ${UNIFI_STUB_UCG_FIBER_MAC:-02:15:6d:00:30:01}
      - -ip
      - ${UNIFI_STUB_UCG_FIBER_IP:-172.31.242.23}
      - -hostname
      - stub-ucg-fiber
      - -controller
      - http://unifi:8080/inform
      - -no-discovery
      - -ssh-listen
      - 0.0.0.0:22
      - -ssh-host-key
      - /var/lib/unifi-stubd/ssh_host_rsa_key
      - -ssh-state
      - /var/lib/unifi-stubd/adoption.env
      - -status-path
      - /var/lib/unifi-stubd/status.json

networks:
  lab:
    internal: true
    ipam:
      config:
        - subnet: ${UNIFI_STUB_LAB_SUBNET:-172.31.242.0/24}
  ui:

volumes:
  mongo_data:
  unifi_config:
  stub_ugw3_state:
  stub_uxg_lite_state:
  stub_uxgpro_state:
  stub_ucg_fiber_state:
