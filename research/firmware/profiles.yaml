# Machine-readable firmware profile catalog for lab simulation research.

schema: unifi-stubd/firmware-profile-catalog/v1
updated: 2026-05-17
notes:
  - Firmware images, extracted root filesystems, controller captures, auth keys,
    SSH keys, tokens, certificates, password hashes, and private lab addresses
    must stay out of Git.
  - A stub profile is enough for synthetic unifi-stubd simulation, but a real
    firmware profile also needs a locally extracted vendor rootfs and a wrapper
    matched to that firmware family.
